server {
    listen 80;
    server_name agent.nbe.llc;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name agent.nbe.llc;

    # SSL — Hostinger manages certs, or use certbot:
    # certbot --nginx -d agent.nbe.llc
    ssl_certificate /etc/letsencrypt/live/agent.nbe.llc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.nbe.llc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to Agent Zero UI
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
