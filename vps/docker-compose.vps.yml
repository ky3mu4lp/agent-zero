version: "3.8"

services:
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: A-01-VPS
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      # Main user data — skills, knowledge, projects, settings, tasks
      - /opt/agent-zero/usr:/a0/usr

      # Custom Python tools (synced via usr/ → GitHub → VPS)
      - /opt/agent-zero/usr/python_tools/gmail_tool.py:/a0/python/tools/gmail_tool.py

      # Modified Python helpers (searxng RFC bypass, etc.)
      - /opt/agent-zero/usr/python_helpers/searxng.py:/a0/python/helpers/searxng.py
    env_file:
      - /opt/agent-zero/usr/.env
    environment:
      - AGENT_ZERO_AUTH_LOGIN=admin
      - AGENT_ZERO_AUTH_PASSWORD=8273225462Gabylp@
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
